<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dunex Arcade</title>
  <link rel="stylesheet" href="./style.css?v=20260414b" />
</head>
<body>
  <div class="splash-screen" id="splashScreen">
    <video class="splash-video" id="splashVideo" src="./AI-vid-1.mp4" autoplay muted loop playsinline></video>
    <div class="splash-overlay">
      <span class="brand-chip" id="splashChip"></span>
      <h1 id="splashTitle"></h1>
      <p id="splashText"></p>
      <div class="splash-actions">
        <button class="skip-btn" id="skipSplashBtn"></button>
      </div>
    </div>
  </div>

  <div class="shell">
    <header class="top-bar">
      <div class="bar-left">
        <div class="brand-mark">D</div>
        <div class="brand-copy">
          <strong id="globalBrandTitle"></strong>
          <span id="globalBrandSubtitle"></span>
        </div>
      </div>
      <div class="bar-right">
        <button class="secondary-btn hidden" id="homeBtn"></button>
        <button class="secondary-btn" id="presentationToggleBtn"></button>
        <div class="lang-switch" aria-label="Language switch">
          <button class="lang-btn active" data-lang="fr">FR</button>
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="es">ES</button>
          <button class="lang-btn" data-lang="it">IT</button>
        </div>
      </div>
    </header>

    <main>
      <section class="screen active" id="homeScreen">
        <div class="home-hero">
          <div class="home-copy">
            <p class="eyebrow" id="homeEyebrow"></p>
            <h1 id="homeTitle"></h1>
            <p class="hero-text" id="homeText"></p>
            <div class="hero-actions">
              <button class="primary-btn" id="featuredLaunchBtn"></button>
              <button class="secondary-btn" id="featuredPuzzleBtn"></button>
            </div>
            <div class="feature-actions">
              <a class="hero-link" href="./smoke-test.html" id="homeSmokeLink"></a>
            </div>
            <div class="score-panel">
              <div class="score-card"><span class="score-label" id="homeLiveAppsLabel"></span><strong id="homeLiveAppsValue"></strong></div>
              <div class="score-card"><span class="score-label" id="homeGenresLabel"></span><strong id="homeGenresValue"></strong></div>
              <div class="score-card"><span class="score-label" id="homeControlsLabel"></span><strong id="homeControlsValue"></strong></div>
            </div>
          </div>
          <div class="home-video-stage">
            <video class="home-hero-video" src="./AI-vid-1.mp4" autoplay muted loop playsinline></video>
          </div>
        </div>
        <div class="feature-ribbon">
          <div class="gallery-header">
            <div>
              <h2 id="galleryTitle"></h2>
              <p class="supporting-text" id="galleryIntro"></p>
            </div>
            <div class="tile-badges" id="galleryChips"></div>
          </div>
          <div class="app-grid" id="appGrid"></div>
        </div>
      </section>

      <section class="screen" id="courseScreen">
        <div class="screen-panel course-shell">
          <header class="hero">
            <div>
              <p class="eyebrow">AI on the Court</p>
              <h1 id="courseHeroTitle"></h1>
              <p class="hero-text" id="courseHeroText"></p>
              <div class="hero-actions">
                <button class="primary-btn" id="startDemoBtn"></button>
                <button class="secondary-btn" id="randomChallengeBtn"></button>
              </div>
              <div class="hero-links">
                <a class="hero-link" href="./smoke-test.html" id="smokeTestLink"></a>
              </div>
              <p class="kbd-hint" id="keyboardHint"></p>
            </div>
            <div class="score-panel">
              <div class="score-card"><span class="score-label" id="quizScoreLabel"></span><strong id="quizScore">0</strong></div>
              <div class="score-card"><span class="score-label" id="promptScoreLabel"></span><strong id="promptScore">0</strong></div>
              <div class="score-card"><span class="score-label" id="truthScoreLabel"></span><strong id="truthScore">0</strong></div>
            </div>
          </header>

          <div class="utility-bar">
            <div class="timer-card">
              <span class="score-label" id="shotClockTitle"></span>
              <div class="shot-clock" id="shotClockDisplay">24</div>
              <div class="timer-actions">
                <button class="secondary-btn" id="set24Btn">24s</button>
                <button class="secondary-btn" id="set14Btn">14s</button>
                <button class="primary-btn" id="toggleClockBtn"></button>
                <button class="secondary-btn" id="resetClockBtn"></button>
              </div>
              <p class="timer-note" id="shotClockNote"></p>
            </div>
            <div class="bar-right">
              <span class="presentation-badge" id="presentationBadge"></span>
              <span class="presentation-note" id="presentationNote"></span>
            </div>
          </div>

          <nav class="top-nav">
            <div class="nav-wrap" id="courseNav"></div>
          </nav>

          <section class="panel active" id="learnPanel">
            <div class="panel-head">
              <h2 id="learnTitle"></h2>
              <p class="panel-intro" id="learnIntro"></p>
            </div>
            <div class="tile-grid" id="learnGrid"></div>
            <div class="coach-card">
              <h3 id="coachCardTitle"></h3>
              <p id="coachTip"></p>
              <button class="secondary-btn" id="nextTipBtn"></button>
            </div>
          </section>

          <section class="panel" id="builderPanel">
            <div class="panel-head">
              <h2 id="builderTitle"></h2>
              <p class="panel-intro" id="builderIntro"></p>
            </div>
            <div class="builder-grid">
              <label><span id="goalLabel"></span><select id="goalSelect"></select></label>
              <label><span id="audienceLabel"></span><select id="audienceSelect"></select></label>
              <label><span id="styleLabel"></span><select id="styleSelect"></select></label>
            </div>
            <div class="action-row">
              <button class="primary-btn" id="buildPromptBtn"></button>
              <button class="secondary-btn" id="randomizeIdeaBtn"></button>
            </div>
            <div class="output-card">
              <h3 id="builderOutputTitle"></h3>
              <p id="builderOutput"></p>
            </div>
          </section>

          <section class="panel" id="labPanel">
            <div class="panel-head">
              <h2 id="labTitle"></h2>
              <p class="panel-intro" id="labIntro"></p>
            </div>
            <label><span id="promptLabel"></span><textarea id="promptInput"></textarea></label>
            <div class="action-row">
              <button class="primary-btn" id="analyzePromptBtn"></button>
              <button class="secondary-btn" id="loadExampleBtn"></button>
            </div>
            <div class="lab-grid">
              <div class="output-card"><h3 id="analysisTitle"></h3><p id="analysisOutput"></p></div>
              <div class="output-card"><h3 id="improvedTitle"></h3><p id="improvedOutput"></p></div>
            </div>
          </section>

          <section class="panel" id="truthPanel">
            <div class="panel-head">
              <h2 id="truthTitle"></h2>
              <p class="panel-intro" id="truthIntro"></p>
            </div>
            <div class="truth-card">
              <h3 id="truthQuestion"></h3>
              <div class="truth-answer-box">
                <strong id="truthAnswerLabel"></strong>
                <p class="truth-answer" id="truthAnswer"></p>
              </div>
              <div class="action-row">
                <button class="secondary-btn" id="trustBtn"></button>
                <button class="primary-btn" id="verifyBtn"></button>
              </div>
              <div class="output-card"><h3 id="truthFeedbackTitle"></h3><p id="truthFeedback"></p></div>
              <button class="secondary-btn" id="nextTruthBtn"></button>
            </div>
          </section>

          <section class="panel" id="quizPanel">
            <div class="panel-head">
              <h2 id="quizTitle"></h2>
              <p class="panel-intro" id="quizIntro"></p>
            </div>
            <div class="quiz-card">
              <p class="muted" id="quizProgress"></p>
              <h3 id="quizQuestion"></h3>
              <div class="quiz-options" id="quizOptions"></div>
              <p class="quiz-feedback" id="quizFeedback"></p>
              <div class="action-row">
                <button class="primary-btn" id="nextQuizBtn"></button>
                <button class="secondary-btn" id="restartQuizBtn"></button>
              </div>
            </div>
          </section>
        </div>
      </section>

      <section class="screen" id="puzzleScreen">
        <div class="screen-panel puzzle-shell">
          <div class="puzzle-header">
            <div>
              <p class="eyebrow" id="puzzleEyebrow"></p>
              <h1 id="puzzleTitle"></h1>
              <p class="puzzle-intro" id="puzzleIntro"></p>
            </div>
            <div class="mini-actions"><button class="primary-btn" id="resetPuzzleBtn"></button></div>
          </div>
          <div class="puzzle-main">
            <div class="board-wrap">
              <div class="board-grid" id="boardGrid"></div>
              <div class="legend-row">
                <span class="puzzle-key" id="puzzleKeyHint"></span>
                <span class="puzzle-key" id="puzzleMouseHint"></span>
              </div>
            </div>
            <div>
              <div class="stats-card"><span class="score-label" id="puzzleScoreLabel"></span><strong class="stats-value" id="puzzleScore">0</strong><p class="stats-subtitle" id="puzzleStatus"></p></div>
              <div class="rack-card"><h3 id="rackTitle"></h3><p class="rack-hint" id="rackHint"></p><div class="rack-list" id="pieceRack"></div></div>
              <div class="rack-card"><h3 id="puzzleHowTitle"></h3><p class="rack-hint" id="puzzleHowText"></p></div>
            </div>
          </div>
        </div>
      </section>

      <section class="screen" id="arcadeScreen">
        <div class="screen-panel arcade-shell">
          <header class="arcade-hero">
            <div>
              <p class="eyebrow" id="arcadeEyebrow"></p>
              <h1 id="arcadeTitle"></h1>
              <p class="hero-text" id="arcadeIntro"></p>
            </div>
            <div class="mini-actions">
              <button class="primary-btn" id="arcadeActionBtn"></button>
              <button class="secondary-btn" id="arcadeResetBtn"></button>
            </div>
          </header>
          <div class="arcade-layout">
            <div class="canvas-card">
              <canvas id="arcadeCanvas" width="880" height="520"></canvas>
            </div>
            <aside class="arcade-sidebar">
              <div class="stats-card"><span class="score-label" id="arcadeScoreLabel"></span><strong class="stats-value" id="arcadeScoreValue">0</strong><p class="stats-subtitle" id="arcadeStatusText"></p></div>
              <div class="rack-card"><h3 id="arcadeControlsTitle"></h3><p class="rack-hint" id="arcadeControlsText"></p><div class="control-grid" id="arcadeControls"></div></div>
              <div class="rack-card"><h3 id="arcadeHowTitle"></h3><p class="rack-hint" id="arcadeHowText"></p></div>
            </aside>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js?v=20260414b"></script>
</body>
</html>
